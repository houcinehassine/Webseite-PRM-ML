  <style>
    /* ── Layout ─────────────────────────────────────── */
    .search-page-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* ── Suchbereich oben ───────────────────────────── */
    .search-hero {
      padding: var(--space-12) 0 var(--space-6);
      text-align: center;
    }
    .search-hero-title {
      font-size: var(--text-2xl);
      font-weight: 800;
      letter-spacing: -.02em;
      margin-bottom: var(--space-1);
    }
    .search-hero-sub {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }

    /* Suchfeld */
    .search-input-wrap {
      position: relative;
      margin-bottom: var(--space-4);
    }
    .search-input-icon {
      position: absolute;
      left: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      font-size: var(--text-lg);
      padding: var(--space-4) var(--space-4) var(--space-4) calc(var(--space-4) * 2 + 20px);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-xl);
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      font-family: var(--font-sans, sans-serif);
      box-sizing: border-box;
      transition: border-color 0.15s;
    }
    .search-input:focus {
      border-color: var(--color-primary);
    }
    .search-input::placeholder {
      color: var(--color-text-faint, var(--color-text-muted));
    }
    .search-kbd {
      position: absolute;
      right: var(--space-4);
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.65rem;
      padding: 2px 6px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-surface-2, var(--color-surface));
      color: var(--color-text-muted);
      font-family: var(--font-mono, monospace);
      pointer-events: none;
    }

    /* Filter-Tabs */
    .filter-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: center;
    }
    .filter-btn {
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full, 999px);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: .04em;
      transition: border-color 0.1s, color 0.1s, background 0.1s;
    }
    .filter-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }
    .filter-btn.active {
      background: var(--color-primary);
      border-color: var(--color-primary);
      color: #fff;
    }

    /* ── Ergebnis-Bereich ───────────────────────────── */
    .results-section {
      padding-bottom: var(--space-16);
    }
    .results-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin: var(--space-2) 0 var(--space-4);
    }

    /* Ergebnis-Karte */
    .result-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-5);
      margin-bottom: var(--space-4);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .result-card:hover {
      border-color: var(--color-primary);
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
    }

    /* Badges */
    .result-badges {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-2);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: var(--radius-full, 999px);
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .badge-chapter {
      background: var(--color-surface-2, var(--color-surface-offset, #f3f3f2));
      color: var(--color-text-muted);
    }
    .badge-code        { background: color-mix(in oklab, var(--color-primary)  14%, var(--color-surface)); color: var(--color-primary); }
    .badge-konzept     { background: color-mix(in oklab, var(--color-success)  14%, var(--color-surface)); color: var(--color-success); }
    .badge-formel      { background: color-mix(in oklab, var(--color-warning)  18%, var(--color-surface)); color: var(--color-warning); }
    .badge-beispiel    { background: color-mix(in oklab, #06b6d4              14%, var(--color-surface)); color: #0891b2; }
    .badge-quiz        { background: color-mix(in oklab, #8b5cf6              14%, var(--color-surface)); color: #7c3aed; }
    .badge-cheatsheet  { background: color-mix(in oklab, #ec4899              14%, var(--color-surface)); color: #be185d; }

    /* Titel */
    .result-title {
      font-size: var(--text-base);
      font-weight: 700;
      color: var(--color-text);
      margin: 0 0 var(--space-3);
      line-height: 1.4;
    }

    /* Code-Schnipsel */
    .snippet-code {
      background: var(--color-surface-offset, var(--color-surface-2, #f5f5f4));
      border-left: 3px solid var(--color-primary);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      padding: var(--space-3) var(--space-4);
      font-family: var(--font-mono, monospace);
      font-size: 0.75rem;
      line-height: 1.65;
      overflow-x: auto;
      margin-bottom: var(--space-3);
      white-space: pre;
      color: var(--color-text-muted);
    }

    /* Text-Beschreibung */
    .snippet-text {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      line-height: 1.65;
      margin-bottom: var(--space-3);
    }

    /* Tags */
    .result-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: var(--space-3);
    }
    .result-tag {
      font-size: 0.63rem;
      padding: 1px 6px;
      border-radius: var(--radius-full, 999px);
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      font-family: var(--font-mono, monospace);
      background: var(--color-surface);
    }

    /* Link */
    .result-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      font-size: var(--text-xs);
      font-weight: 700;
      color: var(--color-primary);
      text-decoration: none;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full, 999px);
      border: 1px solid var(--color-primary);
      transition: background 0.12s;
    }
    .result-link:hover {
      background: color-mix(in oklab, var(--color-primary) 8%, var(--color-surface));
    }

    /* Hervorhebung des Suchbegriffs */
    mark {
      background: color-mix(in oklab, var(--color-warning) 28%, transparent);
      color: inherit;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ── Willkommen / Leerzustand ───────────────────── */
    .welcome-state {
      text-align: center;
      padding: var(--space-10) 0 var(--space-4);
    }
    .welcome-icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-4);
      display: block;
    }
    .welcome-title {
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .welcome-sub {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin-bottom: var(--space-6);
    }
    .welcome-tags {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: center;
    }
    .welcome-tag-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full, 999px);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      cursor: pointer;
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      font-family: var(--font-mono, monospace);
      transition: border-color 0.1s, color 0.1s;
    }
    .welcome-tag-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
    }

    /* Kein Ergebnis */
    .no-results {
      text-align: center;
      padding: var(--space-8) 0;
    }
    .no-results-title {
      font-weight: 700;
      margin-bottom: var(--space-2);
    }
    .no-results-hint {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
    }

    /* ── Ladeindikator ──────────────────────────────── */
    .loading-bar {
      height: 3px;
      background: var(--color-primary);
      animation: loading-anim 1.2s ease-in-out infinite;
      border-radius: 2px;
      margin-bottom: var(--space-6);
    }
    @keyframes loading-anim {
      0%   { width: 0; opacity: 1; }
      70%  { width: 85%; opacity: 1; }
      100% { width: 100%; opacity: 0; }
    }

    /* ── Trennlinie nach Suche ──────────────────────── */
    .search-divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: var(--space-6) 0;
    }
  </style>
</head>

  <script>
  // ─────────────────────────────────────────────────
  //  Theme Toggle (identisch zu index.html)
  // ─────────────────────────────────────────────────
  (function () {
    const html = document.documentElement;
    const btn  = document.getElementById('theme-btn');
    if (!btn) return;

    const saved = localStorage.getItem('prm-theme');
    if (saved) html.dataset.theme = saved;

    const moonSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
      width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>`;
    const sunSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
      width="18" height="18">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41
               M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;

    const update = () => {
      const dark = html.dataset.theme === 'dark';
      btn.innerHTML = dark ? sunSVG : moonSVG;
      btn.setAttribute('aria-label', dark ? 'Hell-Modus' : 'Dark-Modus');
    };
    update();
    btn.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      localStorage.setItem('prm-theme', next);
      update();
    });
  })();
  </script>

  <script>
  // ─────────────────────────────────────────────────
  //  Such-Engine
  // ─────────────────────────────────────────────────

  let fuseInstance   = null;
  let searchData     = [];
  let currentFilter  = 'all';
  let currentQuery   = '';
  let debounceTimer  = null;

  // ── Typ-Konfiguration ──────────────────────────
  const TYPE_CFG = {
    code:       { label: '💻 Code',       cls: 'badge-code'       },
    konzept:    { label: '📝 Konzept',    cls: 'badge-konzept'    },
    formel:     { label: '📐 Formel',     cls: 'badge-formel'     },
    beispiel:   { label: '🔍 Beispiel',   cls: 'badge-beispiel'   },
    quiz:       { label: '🧠 Quiz',       cls: 'badge-quiz'       },
    cheatsheet: { label: '📋 Cheatsheet', cls: 'badge-cheatsheet' },
  };

  // ── Hilfsfunktionen ───────────────────────────
  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  /**
   * Markiert alle Vorkommen des Suchbegriffs im Text.
   * Sicher: escapet zuerst, dann fügt <mark> ein.
   */
  function hlText(text, query) {
    if (!text) return '';
    const safe = escHtml(text);
    if (!query || query.length < 2) return safe;

    const words = query.trim().split(/\s+/)
      .filter(w => w.length >= 2)
      .map(escRegex);
    if (!words.length) return safe;

    const pattern = new RegExp(`(${words.join('|')})`, 'gi');
    return safe.replace(pattern, '<mark>$1</mark>');
  }

  // ── Index laden ───────────────────────────────
  async function loadSearchIndex() {
    try {
      if (!window.SEARCH_DATA) throw new Error('search-index.js nicht geladen');
      searchData = window.SEARCH_DATA;

      fuseInstance = new Fuse(searchData, {
        keys: [
          { name: 'title',       weight: 5 },
          { name: 'tags',        weight: 4 },
          { name: 'snippet',     weight: 3 },
          { name: 'description', weight: 2 },
          { name: 'chapter',     weight: 1 },
          { name: 'page',        weight: 1 },
        ],
        threshold:         0.38,
        includeScore:      true,
        minMatchCharLength: 2,
        ignoreLocation:    true,
        useExtendedSearch: false,
      });

      // Ladeanzeige entfernen
      const loader = document.getElementById('results-loading');
      if (loader) loader.remove();

      // URL-Parameter auswerten (z.B. search.html?q=scatter)
      const params = new URLSearchParams(location.search);
      const qParam = params.get('q');
      if (qParam) {
        const input = document.getElementById('search-input');
        input.value = qParam;
        doSearch(qParam);
      } else {
        showWelcome();
      }

    } catch (err) {
      console.error('Suchindex konnte nicht geladen werden:', err);
      showIndexError();
    }
  }

  // ── Suche ausführen ───────────────────────────
  function doSearch(query) {
    currentQuery = query.trim();

    if (!currentQuery || currentQuery.length < 2) {
      showWelcome();
      return;
    }

    if (!fuseInstance) return;

    // Suchen
    let results = fuseInstance.search(currentQuery).map(r => r.item);

    // Typ-Filter anwenden
    if (currentFilter === 'python') {
      // Python ist kein Typ, sondern ein Kapitel → über URL/Kapitel filtern
      results = results.filter(r =>
        (r.url && r.url.startsWith('Python/')) ||
        (r.chapter && r.chapter.includes('Python'))
      );
    } else if (currentFilter !== 'all') {
      results = results.filter(r => r.type === currentFilter);
    }

    // URL aktualisieren (ohne Reload)
    const url = new URL(location.href);
    url.searchParams.set('q', currentQuery);
    history.replaceState(null, '', url.toString());

    renderResults(results, currentQuery);
  }

  // ── Ergebnisse rendern ────────────────────────
  function renderResults(results, query) {
    const area = document.getElementById('results-area');

    if (!results.length) {
      area.innerHTML = `
        <div class="no-results">
          <p class="no-results-title">Kein Ergebnis für „${escHtml(query)}"</p>
          <p class="no-results-hint">
            Tipp: Versuche kürzere Begriffe · prüfe die Schreibweise ·
            oder entferne den Typ-Filter
          </p>
        </div>`;
      return;
    }

    const count = results.length;
    const meta  = `<p class="results-meta">${count} Ergebnis${count !== 1 ? 'se' : ''} für „${escHtml(query)}"</p>`;
    const cards = results.map(item => renderCard(item, query)).join('');

    area.innerHTML = meta + cards;
  }

  // ── Einzelne Ergebnis-Karte ───────────────────
  function renderCard(item, query) {
    const type = TYPE_CFG[item.type] || TYPE_CFG.konzept;

    // Badges
    const typeBadge = `<span class="badge ${type.cls}">${type.label}</span>`;
    const chapBadge = `<span class="badge badge-chapter">${escHtml(item.chapter)} · ${escHtml(item.page)}</span>`;

    // Titel mit Hervorhebung
    const titleHtml = hlText(item.title, query);

    // Snippet: Code oder Text
    let snippetHtml = '';
    if (item.type === 'code' && item.snippet) {
      snippetHtml = `<pre class="snippet-code"><code>${hlText(item.snippet, query)}</code></pre>`;
    } else if (item.description) {
      snippetHtml = `<p class="snippet-text">${hlText(item.description, query)}</p>`;
    }

    // Tags (max. 8, passende zuerst)
    const tags = (item.tags || []).slice(0, 8);
    const tagsHtml = tags.length
      ? `<div class="result-tags">${tags.map(t => `<span class="result-tag">${hlText(t, query)}</span>`).join('')}</div>`
      : '';

    // Link – direkt zum Abschnitt
    const href   = item.anchor ? `${item.url}${item.anchor}` : item.url;
    const label  = item.anchor
      ? `→ ${item.chapter} · ${item.page} – Abschnitt öffnen`
      : `→ ${item.chapter} · ${item.page} – Seite öffnen`;

    return `
      <article class="result-card">
        <div class="result-badges">
          ${typeBadge}
          ${chapBadge}
        </div>
        <h2 class="result-title">${titleHtml}</h2>
        ${snippetHtml}
        ${tagsHtml}
        <a href="${escHtml(href)}" class="result-link">${label}</a>
      </article>`;
  }

  // ── Willkommens-Zustand ───────────────────────
  const EXAMPLE_QUERIES = [
    'scatter', 'train_test_split', 'plt.scatter',
    'k-means', 'DBSCAN', 'SVM', 'Kernel',
    'Random Forest', 'Overfitting', 'cross_val_score',
    'StandardScaler', 'Confusion Matrix', 'ROC',
    'GridSearchCV', 'PCA', 'Silhouette',
  ];

  function showWelcome() {
    const area = document.getElementById('results-area');
    const tags = EXAMPLE_QUERIES.map(q =>
      `<button class="welcome-tag-btn" onclick="quickSearch('${escHtml(q)}')">${escHtml(q)}</button>`
    ).join('');

    area.innerHTML = `
      <div class="welcome-state">
        <span class="welcome-icon">🎓</span>
        <p class="welcome-title">Was steckt hinter deinem Suchbegriff?</p>
        <p class="welcome-sub">
          Die Suche zeigt dir den echten Code und die Erklärung direkt –<br>
          plus einen Link zum genauen Abschnitt auf der Seite.
        </p>
        <div class="welcome-tags">${tags}</div>
      </div>`;

    // URL bereinigen
    history.replaceState(null, '', location.pathname);
  }

  function showIndexError() {
    const loader = document.getElementById('results-loading');
    if (loader) loader.remove();
    document.getElementById('results-area').innerHTML = `
      <div class="no-results">
        <p class="no-results-title">⚠️ search-index.json nicht gefunden</p>
        <p class="no-results-hint">
          Führe zuerst <code>python3 generate_search_index.py</code> im Projektroot aus.
        </p>
      </div>`;
  }

  function quickSearch(q) {
    const input = document.getElementById('search-input');
    input.value = q;
    input.focus();
    doSearch(q);
  }

  // ── Event Listeners ───────────────────────────
  document.getElementById('search-input').addEventListener('input', function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => doSearch(this.value), 220);
  });

  // Filter-Buttons
  document.getElementById('filter-row').addEventListener('click', function (e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;

    if (currentQuery) doSearch(currentQuery);
  });

  // Tastaturkürzel: Cmd/Strg + K → Suchfeld fokussieren
  document.addEventListener('keydown', function (e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      const input = document.getElementById('search-input');
      input.focus();
      input.select();
    }
    // Escape → Suchfeld leeren + Willkommensseite
    if (e.key === 'Escape') {
      const input = document.getElementById('search-input');
      if (document.activeElement === input) {
        input.value = '';
        showWelcome();
      }
    }
  });

  // ── Index laden (sobald Seite fertig ist) ─────
  if (typeof Fuse !== 'undefined') {
    loadSearchIndex();
  } else {
    // Fuse.js noch nicht geladen – warte kurz
    window.addEventListener('load', loadSearchIndex);
  }
  </script>

</body>
</html>
